<!DOCTYPE html>

<head>

        extend: {
          colors: {

<body class="font-body text-secondary bg-light" data-page="home">

  <!-- Loader -->
  <div id="page-loader" style="position:fixed;inset:0;z-index:9999;background:#111113;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s ease;">
    <div style="width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);border-top-color:#c8702a;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-500">

      <a href="#hero_1" id="nav-logo" class="font-heading font-extrabold text-2xl tracking-tight text-white transition-colors duration-300"></a>
      <div class="hidden lg:flex items-center gap-8" id="nav-links"></div>
      <a href="#" id="nav-cta" class="hidden lg:inline-flex items-center gap-2 bg-primary text-white font-semibold px-6 py-3 rounded-lg hover:bg-opacity-90 transition-all hover:-translate-y-0.5 text-sm"></a>
      <button id="mobile-toggle" class="lg:hidden text-white w-10 h-10 flex items-center justify-center" aria-label="Menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="lg:hidden hidden bg-dark/98 -webkit-backdrop-filter: blur(12px) backdrop-blur-lg border-t border-white/10">
      <div class="px-6 py-6 flex flex-col gap-4" id="mobile-links"></div>
    </div>
  </nav>
<!-- SK_WIDGET_START -->
<script src="https://sharkmedia-zone.vercel.app/proposal-widget.js?slug=test2-1ep2"></script>

  <main>
    <!-- Hero -->
    <section id="hero_1" data-section="hero_1" class="relative min-h-screen flex items-center overflow-hidden">
      <div class="absolute inset-0 bg-dark/60 z-10"></div>
      <div id="hero-bg" class="absolute inset-0 bg-cover bg-center"></div>
      <div class="relative z-20 max-w-7xl mx-auto px-6 lg:px-8 w-full py-32">
        <div class="max-w-3xl">
          <div id="hero-badge" class="hero-anim inline-flex items-center gap-2 bg-primary/20 border border-primary/40 text-primary px-4 py-2 rounded-full text-sm font-semibold mb-8 backdrop-blur-sm"></div>
          <h1 data-section="hero_1" data-field="headline" class="hero-anim font-heading font-black text-4xl sm:text-5xl lg:text-7xl text-white leading-[1.08] mb-6"></h1>
          <p data-section="hero_1" data-field="subheadline" class="hero-anim text-lg sm:text-xl text-white/80 leading-relaxed mb-10 max-w-2xl"></p>
          <div class="hero-anim flex flex-wrap gap-4">
            <a data-section="hero_1" data-field="cta_text" href="#" class="inline-flex items-center gap-2 bg-primary text-white font-semibold px-8 py-4 rounded-lg hover:bg-opacity-90 transition-all hover:-translate-y-0.5 text-base shadow-sm"></a>
            <a data-section="hero_1" data-field="cta_secondary_text" href="#" class="inline-flex items-center gap-2 border-2 border-white/30 text-white font-semibold px-8 py-4 rounded-lg hover:border-white/60 hover:bg-white/10 transition-all text-base"></a>
          </div>
        </div>
      </div>
      <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-light to-transparent z-20"></div>
    </section>

    <!-- About -->
    <section id="about_1" data-section="about_1" class="py-24 lg:py-32 bg-light">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="grid lg:grid-cols-2 gap-16 items-center">
          <div class="anim">
            <span data-section="about_1" data-field="label" class="section-label"></span>
            <h2 data-section="about_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-secondary mt-4 mb-6"></h2>
            <p data-section="about_1" data-field="text" class="text-muted text-lg leading-relaxed mb-4"></p>
            <p data-section="about_1" data-field="text_2" class="text-muted text-lg leading-relaxed mb-10"></p>
            <div id="about-stats" class="grid grid-cols-3 gap-6"></div>
          </div>
          <div class="anim">
            <div class="relative">
              <img data-section="about_1" data-field="image" src="" alt="O nas" class="rounded-2xl w-full aspect-[4/3] object-cover shadow-lg">
              <div class="absolute -bottom-6 -left-6 w-32 h-32 border-4 border-primary rounded-2xl -z-10"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Services -->
    <section id="services_1" data-section="services_1" class="py-24 lg:py-32 bg-white">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="text-center max-w-2xl mx-auto mb-20 anim">
          <span data-section="services_1" data-field="label" class="section-label"></span>
          <h2 data-section="services_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-secondary mt-4 mb-4"></h2>
          <p data-section="services_1" data-field="subheadline" class="text-muted text-lg"></p>
        </div>
        <div id="services-list" class="space-y-20"></div>
      </div>
    </section>

    <!-- Features / Why Us -->
    <section id="features_1" data-section="features_1" class="py-24 lg:py-32 bg-secondary text-white">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="text-center max-w-2xl mx-auto mb-16 anim">
          <span data-section="features_1" data-field="label" class="section-label-light"></span>
          <h2 data-section="features_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-white mt-4 mb-4"></h2>
          <p data-section="features_1" data-field="subheadline" class="text-white/60 text-lg"></p>
        </div>
        <div id="features-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8 anim stagger"></div>
      </div>
    </section>

    <!-- CTA Banner -->
    <section id="cta_1" data-section="cta_1" class="relative py-24 lg:py-32 overflow-hidden">
      <div class="absolute inset-0 bg-dark/70 z-10"></div>
      <div id="cta-bg" class="absolute inset-0 bg-cover bg-center"></div>
      <div class="relative z-20 max-w-3xl mx-auto px-6 lg:px-8 text-center anim">
        <h2 data-section="cta_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-white mb-6"></h2>
        <p data-section="cta_1" data-field="text" class="text-white/80 text-lg mb-10"></p>
        <a data-section="cta_1" data-field="cta_text" href="#" class="inline-flex items-center gap-3 bg-primary text-white font-semibold px-10 py-5 rounded-lg hover:bg-opacity-90 transition-all hover:-translate-y-0.5 text-lg shadow-sm"></a>
      </div>
    </section>

    <!-- Testimonials -->
    <section id="testimonials_1" data-section="testimonials_1" class="py-24 lg:py-32 bg-light">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="text-center max-w-2xl mx-auto mb-16 anim">
          <span data-section="testimonials_1" data-field="label" class="section-label"></span>
          <h2 data-section="testimonials_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-secondary mt-4"></h2>
        </div>
        <div id="testimonials-container" class="relative max-w-4xl mx-auto anim">
          <div id="testimonial-slider" class="overflow-hidden"></div>
          <div class="flex justify-center gap-3 mt-10" id="testimonial-dots"></div>
        </div>
      </div>
    </section>

    <!-- Process -->
    <section id="process_1" data-section="process_1" class="py-24 lg:py-32 bg-white">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="text-center max-w-2xl mx-auto mb-16 anim">
          <span data-section="process_1" data-field="label" class="section-label"></span>
          <h2 data-section="process_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl lg:text-5xl text-secondary mt-4"></h2>
        </div>
        <div id="process-steps" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 anim stagger"></div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact_1" data-section="contact_1" class="py-24 lg:py-32 bg-light">
      <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="grid lg:grid-cols-5 gap-12">
          <div class="lg:col-span-2 anim">
            <span data-section="contact_1" data-field="label" class="section-label"></span>
            <h2 data-section="contact_1" data-field="headline" class="font-heading font-extrabold text-3xl sm:text-4xl text-secondary mt-4 mb-4"></h2>
            <p data-section="contact_1" data-field="text" class="text-muted text-lg mb-10"></p>
            <div id="contact-info" class="space-y-6"></div>
          </div>
          <div class="lg:col-span-3 anim">
            <form id="contact-form" class="bg-white rounded-2xl p-8 lg:p-10 shadow-sm space-y-6">
              <div class="grid sm:grid-cols-2 gap-6">
                <div>
                  <label for="form-name" class="block text-sm font-semibold text-secondary mb-2">Meno</label>
                  <input type="text" id="form-name" name="name" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-secondary">
                </div>
                <div>
                  <label for="form-phone" class="block text-sm font-semibold text-secondary mb-2">Telefon</label>
                  <input type="tel" id="form-phone" name="phone" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-secondary">
                </div>
              </div>
              <div>
                <label for="form-email" class="block text-sm font-semibold text-secondary mb-2">Email</label>
                <input type="email" id="form-email" name="email" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-secondary">
              </div>
              <div>
                <label for="form-message" class="block text-sm font-semibold text-secondary mb-2">Sprava</label>
                <textarea id="form-message" name="message" rows="5" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-secondary resize-none"></textarea>
              </div>
              <button type="submit" id="form-submit" class="w-full bg-primary text-white font-semibold px-8 py-4 rounded-lg hover:bg-opacity-90 transition-all hover:-translate-y-0.5 text-base shadow-sm"></button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer_1" data-section="footer_1" class="bg-dark text-white pt-16 pb-8">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-12 pb-12 border-b border-white/10">
        <div>
          <a href="#hero_1" id="footer-logo" class="font-heading font-extrabold text-2xl text-white mb-4 block"></a>
          <p id="footer-desc" class="text-white/50 leading-relaxed"></p>
        </div>
        <div>
          <h4 class="font-heading font-bold text-sm uppercase tracking-widest text-white/40 mb-4">Navigacia</h4>
          <div id="footer-links" class="flex flex-col gap-3"></div>
        </div>
        <div>
          <h4 class="font-heading font-bold text-sm uppercase tracking-widest text-white/40 mb-4">Kontakt</h4>
          <div id="footer-contact" class="space-y-3 text-white/60"></div>
        </div>
      </div>
      <div class="pt-8 text-center">
        <p id="footer-copyright" class="text-white/30 text-sm"></p>
      </div>
    </div>
  </footer>

  <!-- Scroll to top -->
  <button id="scroll-top" class="fixed bottom-6 right-6 z-40 w-12 h-12 bg-secondary text-white rounded-full shadow-lg flex items-center justify-center opacity-0 pointer-events-none transition-all hover:-translate-y-1 hover:bg-primary" aria-label="Scroll to top">

  </button>
